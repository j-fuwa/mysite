<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18～20歳の頃好きだった歌t</title>
    <link rel="stylesheet" href="css/style_mysong.css">
</head>

<body>
    <div class="mysong">
        <p>
        <div class="ttl">
            「星空のディスタンス」
            <span class="artist">
                <a href="https://ja.wikipedia.org/wiki/THE_ALFEE" target="_blank">
                    THE ALFEE
                </a>
                1984年
            </span>
        </div>
        </p>
        <div class="lyrics">
            <p>激しい風が今　心に舞う</p>
            <p>「サヨナラ」はただ一度の　過ちなのか</p>
            <p>たとえ500マイル　離れても</p>
            <p>夜が来てまた心は　求めあうのさ</p>
        </div>
        <div class="sabi">
            <p>星空の下のディスタンス</p>
            <p>燃え上れ！愛のレジスタンス</p>
            <p>さえぎる夜を乗り越えて</p>
            <p>この胸にもう一度...</p>
            <p>Baby,Come Back！</p>
        </div>

    </div>

    <iframe width="200" height="150" src="https://www.youtube.com/embed/zqjj539qjfs" frameborder="0">
    </iframe>

</body>
